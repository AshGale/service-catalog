services:
  db:
    image: pgvector/pgvector:pg16
    container_name: catalog-db
    restart: unless-stopped
    ports:
      - "${CATALOG_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalog}
      POSTGRES_USER: ${CATALOG_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:-changeme}
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER:-postgres} -d ${CATALOG_DB_NAME:-catalog}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  catalog_pgdata:
